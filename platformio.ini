; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = seeed_xiao_esp32s3

; Host-native unit tests for the pure "functional core" modules (no board
; needed): `pio test -e native`. test_build_src defaults off, so only the test
; files + the pure headers they include are compiled - the hardware-coupled
; src/ is never dragged into the host build.
[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17 -I src

[env:seeed_xiao_esp32s3]
; PIN the platform. Unpinned, a different build box resolved espressif32 6.10.0
; (arduino core 2.0.17) and OTA-bricked the fleet (2026-07-05); the Mac's
; hardware-verified toolchain is 6.12.0 (arduino core 3.20017). Never flash from
; a box whose resolved platform differs from this pin.
platform = espressif32@6.12.0
board = seeed_xiao_esp32s3
framework = arduino
; Pre-build codegen: turns web/*.html|js|css into src/web_assets.gen.{h,cpp}
; (PROGMEM blobs baked into the binary). web/ is the source of truth for the UI.
extra_scripts = pre:tools/gen_web_assets.py
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; Maximum performance settings for XIAO ESP32S3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
; Dual-OTA table (app0/app1) so firmware can be updated over the air. Requires a
; one-time USB flash to install; nvs offset is unchanged so settings survive.
board_build.partitions = partitions_xiao_8mb_ota.csv

; Compiler optimizations for speed.
; NOTE: -ffast-math implies -ffinite-math-only, so isnan()/isinf() guards on
; floats compile to constant-false. Don't rely on NaN/Inf checks in the DSP/math
; paths (audio_dsp.h, fft.h, biquad.h); clamp ranges explicitly instead.
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCAMERA_MODEL_XIAO_ESP32S3
    -O3
    -DNDEBUG
    -DCONFIG_FREERTOS_HZ=1000
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -ffast-math
    -funroll-loops
    -std=gnu++17

upload_speed = 921600
monitor_filters = esp32_exception_decoder

[env:esp32cam]
; PIN the platform — see the note on seeed_xiao_esp32s3. Same known-good 6.12.0.
platform = espressif32@6.12.0
board = esp32cam
framework = arduino
; Pre-build codegen (see seeed env): web/ -> src/web_assets.gen.{h,cpp}.
extra_scripts = pre:tools/gen_web_assets.py
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; Maximum performance settings
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.flash_size = 4MB
; Dual-OTA table (app0/app1) so firmware can be updated over the air. Requires a
; one-time USB flash to install; nvs offset is unchanged so settings survive.
board_build.partitions = partitions_cam_4mb_ota.csv

; Compiler optimizations for speed.
; NOTE: -ffast-math implies -ffinite-math-only, so isnan()/isinf() guards on
; floats compile to constant-false. Don't rely on NaN/Inf checks in the DSP/math
; paths (audio_dsp.h, fft.h, biquad.h); clamp ranges explicitly instead.
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -O3
    -ffast-math
    -funroll-loops
    -DNDEBUG
    -DCONFIG_FREERTOS_HZ=1000
    -DCONFIG_ESP32_DEFAULT_CPU_FREQ_240=1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -std=gnu++17
; Note: lwIP TCP window/MSS/snd-buf are baked into arduino-esp32's precompiled
; libraries (TCP_WND ~5760B) and CANNOT be changed via -D build flags - those
; only produced "redefined" warnings and no effect. Raising the window (the
; real cap on multi-viewer MJPEG fps) requires an IDF-as-component build with a
; custom sdkconfig; left at the SDK default here.

upload_speed = 115200
monitor_filters = esp32_exception_decoder

; ---- Wireless (OTA) upload envs ----
; USB stays the default; these opt into espota so `pio run -e <name>_ota -t upload`
; pushes over WiFi. --auth must match the device's OTA password (the compiled
; OTA_PASSWORD, which defaults to DEVICE_AP_PASS). Keep the secret out of the repo:
; export it once per shell, e.g.  export OTA_PASS=...   then run the upload.
; Override the target per device on the CLI: --upload-port <hostname-or-ip>.
[env:seeed_xiao_esp32s3_ota]
extends = env:seeed_xiao_esp32s3
upload_protocol = espota
upload_port = cyclops.local
upload_flags = --auth=${sysenv.OTA_PASS}

[env:esp32cam_ota]
extends = env:esp32cam
upload_protocol = espota
upload_port = cyclops.local
upload_flags = --auth=${sysenv.OTA_PASS}
