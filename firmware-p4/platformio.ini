; ============================================================================
;  Cyclops ESP32-P4 firmware — ISOLATED combined arduino+esp-idf build.
;
;  This is a SEPARATE PlatformIO project from the fleet at the repo root. The P4
;  MIPI-CSI camera needs Espressif's esp_video / esp_cam_sensor IDF components,
;  which the pure-Arduino precompiled-libs build cannot add. `framework =
;  arduino, espidf` compiles arduino + IDF from source against our own
;  sdkconfig, unlocking the IDF component manager and CSI/ISP/JPEG Kconfig.
;
;  Kept out of the root project on purpose: the full IDF source build,
;  managed_components/, and custom sdkconfig must NOT touch the fleet's
;  pristine pure-Arduino build. Phases 0/1 (toolchain + WiFi) were proven in
;  the root [env:esp32p4]; this project carries the port forward from Phase 2.
; ============================================================================
[platformio]
; ISOLATED package store for the P4 toolchain. The classic fleet platform and
; pioarduino both install a package NAMED framework-arduinoespressif32 with
; incompatible versions (platformio/3.20017.241212 vs espressif/3.3.9), so a
; shared ~/.platformio/packages slot thrashes: each build of one side evicts the
; other's framework (the fleet-brick class of hazard). A dedicated packages_dir
; makes the P4 toolchain physically unable to touch the fleet's pinned one.
packages_dir = ${platformio.core_dir}/packages-p4nano

[env:esp32p4cam]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-p4-evboard
framework = arduino, espidf
; Larger app partition — the combined image (arduino + IDF + esp_video + camera)
; overflows IDF's default 1MB factory slot.
board_build.partitions = partitions.csv
; Post script: link the generated OV5647 IPA (AE/AWB tuning) config object
; directly so it beats the prebuilt libesp_ipa.a's empty default (see file).
extra_scripts = post:link_ipa_config.py

; ---- Wireless (OTA) upload env ----
; Same espota convention as the fleet: export OTA_PASS once per shell, then
;   pio run -d firmware-p4 -e esp32p4cam_ota -t upload --upload-port 192.168.4.67
[env:esp32p4cam_ota]
extends = env:esp32p4cam
upload_protocol = espota
upload_port = 192.168.4.67
upload_flags = --auth=${sysenv.OTA_PASS}
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder
build_flags =
    -DBOARD_HAS_PSRAM
    -DCAMERA_MODEL_ESP32P4      ; selects the MIPI/esp_video camera + P4 capability branch
    -std=gnu++17
